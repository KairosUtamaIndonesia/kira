# Lefthook configuration
# Install hooks: bun run setup:hooks
# Docs: https://evilmartians.com/chronicles/lefthook-knock-your-teams-code-quality-into-shape

pre-commit:
  parallel: false
  skip:
    - merge
    - squash
  commands:
    format:
      glob: "*.{css,js,jsx,json,jsonc,md,mdx,ts,tsx}"
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    lint:
      run: bun run lint
    format-check:
      run: bun run format:check

pre-push:
  skip:
    - merge
    - squash
  commands:
    check:
      run: bun run check:hook
