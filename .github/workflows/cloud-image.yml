name: Cloud Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cloud-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kira-cloud

jobs:
  changes:
    name: Detect cloud changes
    runs-on: ubuntu-latest
    outputs:
      cloud: ${{ steps.filter.outputs.cloud }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cloud:
              - "apps/cloud/**"
              - "packages/**"
              - "package.json"
              - "bun.lock"
              - "Dockerfile*"

  build:
    name: Build and push cloud image
    runs-on: ubuntu-latest
    needs: changes
    # Always on tag pushes or manual dispatch; on branch push only when cloud changed
    if: |
      needs.changes.outputs.cloud == 'true' ||
      github.ref_type == 'tag' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cloud/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BETTER_AUTH_URL=${{ vars.KIRA_CLOUD_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
