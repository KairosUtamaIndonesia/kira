name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR and tag
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # A PAT or GitHub App token is REQUIRED for the created tag/release to
          # trigger admin-image.yml and desktop-release.yml. The default
          # GITHUB_TOKEN cannot trigger downstream workflows. Falls back to
          # GITHUB_TOKEN (release PR works, but downstream builds will not fire).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
