name: CI

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
      cloud: ${{ steps.filter.outputs.cloud }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'apps/desktop/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            cloud:
              - 'apps/cloud/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - '.github/workflows/ci.yml'

  # ── Format check (fast, no Tauri deps — cargo fmt does not compile) ──
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: bun install --frozen-lockfile
      - run: bun run format:all:check

  # ── Lint & typecheck (all apps; Tauri deps always — cargo clippy needs them) ──
  lint-check:
    name: Lint & check
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.cloud == 'true'
    env:
      KIRA_CLOUD_URL: ${{ vars.KIRA_CLOUD_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: bun install --frozen-lockfile
      - run: bun run lint:all
      - run: bun run check

  # ── Rust tests (parallel; only when desktop changed; no bun install) ──
  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    env:
      KIRA_CLOUD_URL: ${{ vars.KIRA_CLOUD_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Run Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test
