name: Desktop Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Set up sccache (distributed Rust compilation cache)
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # Cache Bun's global download cache, NOT node_modules: the .bun store
      # relies on symlinks/junctions that actions/cache (tar) does not
      # round-trip reliably on Windows. bun install is fast with a warm
      # global cache and rebuilds the link farm correctly on every OS.
      - name: Cache Bun global cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install lld-link (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install llvm --no-progress -y
      - name: Use lld-link (Windows)
        if: matrix.platform == 'windows-latest'
        run: echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=lld-link" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these secrets before enabling the updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Cloud admin URL baked into the desktop binary. Set the
          # KIRA_CLOUD_URL repository variable to override the default
          # (https://cloud.kira.localhost).
          KIRA_CLOUD_URL: ${{ vars.KIRA_CLOUD_URL }}
        with:
          projectPath: apps/desktop
          # Attach installers to the release-please release when present;
          # fall back to the tag/branch name for manual workflow_dispatch runs.
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name || github.ref_name }}
          args: ${{ matrix.args }}
